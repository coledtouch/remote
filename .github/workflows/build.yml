name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build companion TV app
        run: gradle :tvapp:assembleDebug --stacktrace

      - name: Bundle TV app into the phone app (for one-tap sideload)
        run: |
          mkdir -p app/src/main/assets
          cp tvapp/build/outputs/apk/debug/tvapp-debug.apk app/src/main/assets/curbtv.apk

      - name: Build phone app
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: curb-remote-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            tvapp/build/outputs/apk/debug/tvapp-debug.apk
          if-no-files-found: error
