// Android TV Remote v2 - Remote protocol (port 6466).
// RemoteMessage field numbers and key codes verified against the published
// protocol (github.com/tronikos/androidtvremote2, louis49/androidtv-remote).
// Key-code enum is a sufficient subset; the wire only carries the number.
syntax = "proto3";
package remote;

option java_package = "com.curbscript.tvremote.proto";
option java_outer_classname = "RemoteProto";
option java_multiple_files = true;

enum RemoteKeyCode {
  KEYCODE_UNKNOWN = 0;
  KEYCODE_HOME = 3;
  KEYCODE_BACK = 4;
  KEYCODE_0 = 7;
  KEYCODE_1 = 8;
  KEYCODE_2 = 9;
  KEYCODE_3 = 10;
  KEYCODE_4 = 11;
  KEYCODE_5 = 12;
  KEYCODE_6 = 13;
  KEYCODE_7 = 14;
  KEYCODE_8 = 15;
  KEYCODE_9 = 16;
  KEYCODE_DPAD_UP = 19;
  KEYCODE_DPAD_DOWN = 20;
  KEYCODE_DPAD_LEFT = 21;
  KEYCODE_DPAD_RIGHT = 22;
  KEYCODE_DPAD_CENTER = 23;
  KEYCODE_VOLUME_UP = 24;
  KEYCODE_VOLUME_DOWN = 25;
  KEYCODE_POWER = 26;
  KEYCODE_ENTER = 66;
  KEYCODE_SEARCH = 84;
  KEYCODE_MEDIA_PLAY_PAUSE = 85;
  KEYCODE_MEDIA_STOP = 86;
  KEYCODE_MEDIA_NEXT = 87;
  KEYCODE_MEDIA_PREVIOUS = 88;
  KEYCODE_MEDIA_REWIND = 89;
  KEYCODE_MEDIA_FAST_FORWARD = 90;
  KEYCODE_MEDIA_PLAY = 126;
  KEYCODE_MEDIA_PAUSE = 127;
  KEYCODE_VOLUME_MUTE = 164;
  KEYCODE_INFO = 165;
  KEYCODE_CHANNEL_UP = 166;
  KEYCODE_CHANNEL_DOWN = 167;
  KEYCODE_GUIDE = 172;
  KEYCODE_CAPTIONS = 175;
  KEYCODE_SETTINGS = 176;
  KEYCODE_TV_POWER = 177;
  KEYCODE_TV_INPUT = 178;
  KEYCODE_MENU = 82;
}

enum RemoteDirection {
  UNKNOWN_DIRECTION = 0;
  START_LONG = 1;
  END_LONG = 2;
  SHORT = 3;
}

message RemoteKeyInject {
  RemoteKeyCode key_code = 1;
  RemoteDirection direction = 2;
}

message RemoteAppLinkLaunchRequest {
  string app_link = 1;
}

message RemotePingRequest {
  int32 val1 = 1;
  int32 val2 = 2;
}

message RemotePingResponse {
  int32 val1 = 1;
}

message RemoteSetActive {
  int32 active = 1;
}

message RemoteStart {
  bool started = 1;
}

message RemoteDeviceInfo {
  string model = 1;
  string vendor = 2;
  int32 unknown1 = 3;
  string unknown2 = 4;
  string package_name = 5;
  string app_version = 6;
}

message RemoteConfigure {
  int32 code1 = 1;
  RemoteDeviceInfo device_info = 2;
}

message RemoteError {
  bool value = 1;
  RemoteMessage message = 2;
}

message RemoteMessage {
  RemoteConfigure remote_configure = 1;
  RemoteSetActive remote_set_active = 2;
  RemoteError remote_error = 3;
  RemotePingRequest remote_ping_request = 8;
  RemotePingResponse remote_ping_response = 9;
  RemoteKeyInject remote_key_inject = 10;
  RemoteStart remote_start = 40;
  RemoteAppLinkLaunchRequest remote_app_link_launch_request = 90;
}
